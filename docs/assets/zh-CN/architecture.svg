<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="660" viewBox="0 0 1080 660" role="img" aria-labelledby="title desc">
  <title id="title">Lang.Avalonia architecture</title>
  <desc id="desc">Architecture diagram showing Avalonia UI, markup extensions, I18nManager, plugins, and language resources.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 26px "Segoe UI",Arial,sans-serif;fill:#0f172a}
      .label{font:600 18px "Segoe UI",Arial,sans-serif;fill:#0f172a}
      .text{font:14px "Segoe UI",Arial,sans-serif;fill:#334155}
      .small{font:12px "Segoe UI",Arial,sans-serif;fill:#475569}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:10}
      .core{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:10}
      .plugin{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}
      .resource{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1080" height="660" fill="#f8fafc"/>
  <text x="48" y="58" class="title">Lang.Avalonia 总体架构</text>
  <text x="48" y="86" class="text">UI 通过标记扩展订阅 Culture，I18nManager 统一调度插件，插件负责加载不同格式资源并提供 fallback。</text>

  <rect x="48" y="132" width="250" height="122" class="box"/>
  <text x="72" y="166" class="label">Avalonia UI</text>
  <text x="72" y="196" class="text">AXAML: {c:I18n ...}</text>
  <text x="72" y="220" class="text">C#: GetResource(key)</text>

  <rect x="394" y="124" width="292" height="138" class="core"/>
  <text x="424" y="160" class="label">Lang.Avalonia Core</text>
  <text x="424" y="190" class="text">I18nExtension / I18nBinding</text>
  <text x="424" y="214" class="text">I18nConverter</text>
  <text x="424" y="238" class="text">I18nManager 单例</text>

  <rect x="780" y="128" width="252" height="126" class="plugin"/>
  <text x="804" y="164" class="label">ILangPlugin</text>
  <text x="804" y="194" class="text">Load / AddResource</text>
  <text x="804" y="218" class="text">Culture / GetResource</text>

  <rect x="86" y="380" width="232" height="130" class="resource"/>
  <text x="112" y="416" class="label">JSON 文件</text>
  <text x="112" y="446" class="text">en-US.json</text>
  <text x="112" y="470" class="text">zh-CN.json</text>

  <rect x="424" y="380" width="232" height="130" class="resource"/>
  <text x="450" y="416" class="label">XML 文件</text>
  <text x="450" y="446" class="text">en-US.xml</text>
  <text x="450" y="470" class="text">zh-CN.xml</text>

  <rect x="762" y="380" width="232" height="130" class="resource"/>
  <text x="788" y="416" class="label">RESX 资源</text>
  <text x="788" y="446" class="text">Resources.resx</text>
  <text x="788" y="470" class="text">Resources.zh-CN.resx</text>

  <path d="M298 193 H394" class="line"/>
  <path d="M686 193 H780" class="line"/>
  <path d="M878 254 V334 H202 V380" class="dash"/>
  <path d="M906 254 V334 H540 V380" class="dash"/>
  <path d="M934 254 V334 H878 V380" class="dash"/>

  <text x="316" y="180" class="small">绑定值请求</text>
  <text x="700" y="180" class="small">插件接口</text>
  <text x="612" y="360" class="small">按格式加载并缓存资源</text>

  <rect x="356" y="548" width="368" height="64" class="core"/>
  <text x="386" y="586" class="label">CultureChanged 通知 UI 重新取值</text>
  <path d="M540 262 V318 H48 V580 H356" class="line"/>
</svg>
