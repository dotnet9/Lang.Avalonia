<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Type-safe key generation</title>
  <desc id="desc">Diagram comparing T4 generation and source generator for producing type-safe language keys.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 26px "Segoe UI",Arial,sans-serif;fill:#0f172a}
      .label{font:700 18px "Segoe UI",Arial,sans-serif;fill:#0f172a}
      .text{font:14px "Segoe UI",Arial,sans-serif;fill:#334155}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:10}
      .gen{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}
      .out{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1080" height="560" fill="#f8fafc"/>
  <text x="48" y="58" class="title">Type-Safe Key Generation</text>
  <text x="48" y="86" class="text">Demos keep T4 templates, and the Analysis package provides a compile-time Source Generator.</text>

  <rect x="72" y="150" width="230" height="122" class="box"/>
  <text x="98" y="188" class="label">Resource files</text>
  <text x="98" y="220" class="text">JSON / XML / RESX</text>
  <text x="98" y="244" class="text">Key: Localization.Main...</text>

  <rect x="412" y="112" width="250" height="122" class="gen"/>
  <text x="438" y="150" class="label">T4 Template</text>
  <text x="438" y="182" class="text">Triggered by save</text>
  <text x="438" y="206" class="text">Generates Language.cs</text>

  <rect x="412" y="300" width="250" height="122" class="gen"/>
  <text x="438" y="338" class="label">Source Generator</text>
  <text x="438" y="370" class="text">AdditionalFiles</text>
  <text x="438" y="394" class="text">Generates Language.g.cs</text>

  <rect x="782" y="202" width="230" height="148" class="out"/>
  <text x="810" y="242" class="label">Type-safe constants</text>
  <text x="810" y="274" class="text">Localization.Main.MainView</text>
  <text x="810" y="298" class="text">.Title = "..."</text>
  <text x="810" y="322" class="text">Used by XAML / C#</text>

  <path d="M302 204 H412" class="line"/>
  <path d="M302 228 C350 228 350 360 412 360" class="dash"/>
  <path d="M662 174 C720 174 720 244 782 244" class="line"/>
  <path d="M662 360 C720 360 720 308 782 308" class="line"/>

  <rect x="82" y="428" width="906" height="72" class="box"/>
  <text x="110" y="458" class="label">Design constraint</text>
  <text x="110" y="486" class="text">Generated values must equal original keys. Only C# identifier names may be sanitized.</text>
</svg>
