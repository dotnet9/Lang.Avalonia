<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Lang.Avalonia usage flow</title>
  <desc id="desc">Usage flow from creating resources to initializing plugin, binding UI, and switching culture.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 26px "Segoe UI",Arial,sans-serif;fill:#0f172a}
      .step{font:700 18px "Segoe UI",Arial,sans-serif;fill:#0f172a}
      .text{font:14px "Segoe UI",Arial,sans-serif;fill:#334155}
      .num{font:700 22px "Segoe UI",Arial,sans-serif;fill:#ffffff}
      .card{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:10}
      .circle{fill:#2563eb}
      .line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1080" height="560" fill="#f8fafc"/>
  <text x="48" y="58" class="title">Usage Flow</text>
  <text x="48" y="86" class="text">The main flow is the same for every format. Only the plugin and resource format change.</text>

  <g transform="translate(56 142)">
    <rect width="180" height="150" class="card"/>
    <circle cx="34" cy="34" r="20" class="circle"/><text x="27" y="42" class="num">1</text>
    <text x="24" y="76" class="step">Install</text>
    <text x="24" y="108" class="text">Core + provider</text>
    <text x="24" y="132" class="text">Json / Xml / Resx</text>
  </g>
  <path d="M236 217 H316" class="line"/>

  <g transform="translate(316 142)">
    <rect width="180" height="150" class="card"/>
    <circle cx="34" cy="34" r="20" class="circle"/><text x="27" y="42" class="num">2</text>
    <text x="24" y="76" class="step">Resources</text>
    <text x="24" y="108" class="text">I18n/*.json</text>
    <text x="24" y="132" class="text">I18n/*.xml / *.resx</text>
  </g>
  <path d="M496 217 H576" class="line"/>

  <g transform="translate(576 142)">
    <rect width="180" height="150" class="card"/>
    <circle cx="34" cy="34" r="20" class="circle"/><text x="27" y="42" class="num">3</text>
    <text x="24" y="76" class="step">Keys</text>
    <text x="24" y="108" class="text">T4 or Analysis</text>
    <text x="24" y="132" class="text">Type-safe constants</text>
  </g>
  <path d="M756 217 H836" class="line"/>

  <g transform="translate(836 142)">
    <rect width="180" height="150" class="card"/>
    <circle cx="34" cy="34" r="20" class="circle"/><text x="27" y="42" class="num">4</text>
    <text x="24" y="76" class="step">Initialize</text>
    <text x="24" y="108" class="text">Register(plugin)</text>
    <text x="24" y="132" class="text">Set default Culture</text>
  </g>

  <path d="M926 292 V340 H186 V378" class="line"/>

  <g transform="translate(56 378)">
    <rect width="260" height="112" class="card"/>
    <text x="24" y="42" class="step">Bind UI</text>
    <text x="24" y="74" class="text">{c:I18n {x:Static ...}}</text>
  </g>
  <path d="M316 434 H418" class="line"/>

  <g transform="translate(418 378)">
    <rect width="260" height="112" class="card"/>
    <text x="24" y="42" class="step">Read In C#</text>
    <text x="24" y="74" class="text">I18nManager.GetResource</text>
  </g>
  <path d="M678 434 H780" class="line"/>

  <g transform="translate(780 378)">
    <rect width="244" height="112" class="card"/>
    <text x="24" y="42" class="step">Switch Runtime</text>
    <text x="24" y="74" class="text">I18nManager.Culture = ...</text>
  </g>
</svg>
